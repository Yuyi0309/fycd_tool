<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 會議簽到統計系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 1.15rem; }

        /* ===== 列印設定 ===== */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .print-container { max-width: 100%; width: 100%; padding: 0; margin: 0; }
            .shadow-sm, .shadow-md, .shadow-xl { box-shadow: none !important; }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

            /* 每個區塊獨立分頁 */
            #page1 { page-break-before: avoid; page-break-after: always; }
            #page2 { page-break-before: always; page-break-after: always; }
            #page3 { page-break-before: always; page-break-after: always; }
            #page4 { page-break-before: always; page-break-after: always; }
            #page5 { page-break-before: always; page-break-after: auto; }

            /* 義字班群列印 */
            #page3 .yi-table { table-layout: fixed; width: 100%; }
            #page3 .yi-table th,
            #page3 .yi-table td {
                overflow: hidden; white-space: nowrap;
                padding: 5px 7px; font-size: 15px;
                border: 1px solid #ccc;
            }
            #page3 .yi-table td.church-col {
                width: 7%; background-color: #fff7ed !important;
                font-weight: bold; text-align: center;
            }
            #page3 .checkmark { font-size: 11px !important; }

            /* 負責講師列印 */
            #page4 .lect-table { table-layout: fixed; width: 100%; }
            #page4 .lect-table th,
            #page4 .lect-table td {
                overflow: hidden; white-space: nowrap;
                padding: 5px 7px; font-size: 15px;
                border: 1px solid #ccc;
            }

            /* 非預設名單列印 */
            .extra-td { font-size: 13px; padding: 4px 10px !important; }

            .checkmark { color: #16a34a !important; font-weight: bold; }
        }

        /* ===== 螢幕樣式 ===== */
        .checked-row { background-color: #dcfce7 !important; }
        .checkmark { color: #16a34a; font-weight: bold; font-size: 1rem; }

        .table-condensed td, .table-condensed th {
            padding: 0.75rem 1rem; border: 1px solid #e2e8f0;
        }
        .zebra-row:nth-child(even) { background-color: #f8fafc; }
        .zebra-row:nth-child(odd)  { background-color: #ffffff; }
        .text-stats-num { font-size: 2.5rem; line-height: 1; }

        /* 義字班群 */
        .yi-table { table-layout: fixed; width: 100%; }
        .yi-table th, .yi-table td { overflow: hidden; white-space: nowrap; }
        .yi-table td.church-col {
            width: 6%; background-color: #fff7ed;
            font-weight: bold; text-align: center;
        }

        /* 負責講師表 */
        .lect-table { table-layout: fixed; width: 100%; }
        .lect-table th, .lect-table td { overflow: hidden; white-space: nowrap; }
        .lect-table td.lect-unit { background-color: #eff6ff; font-weight: bold; text-align: center; }
        .lect-table td.lect-altar { background-color: #f0fdf4; font-weight: bold; }

        /* 分班字色 */
        .unit-fenban { color: #1d4ed8; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-2 md:p-6 text-slate-900">
<div class="max-w-[1600px] mx-auto print-container">

    <!-- 操作面板 -->
    <header class="mb-6 no-print bg-white p-6 rounded-xl shadow-xl border border-slate-200">
        <h1 class="text-3xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-blue-600 text-white px-3 py-1 rounded text-xl">2026</span> 會議簽到統計系統
        </h1>
        <div class="grid grid-cols-1 gap-4">
            <textarea id="barcodeInput" class="w-full h-40 p-4 text-base font-mono border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                placeholder="請在此貼上包含「姓名、佛堂」標題的 Excel 內容..."></textarea>
            <div class="flex flex-wrap gap-4">
                <button id="processBtn" onclick="processAttendance()"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-lg font-bold shadow-md transition-all text-xl">執行核對</button>
                <button onclick="window.print()"
                    class="bg-slate-700 hover:bg-slate-800 text-white px-8 py-3 rounded-lg transition-all text-xl shadow-md">直接列印報表</button>
                <button onclick="resetData()"
                    class="bg-white border border-slate-300 text-slate-600 px-8 py-3 rounded-lg hover:bg-slate-50 text-xl font-medium">清空數據</button>
            </div>
        </div>
    </header>

    <div id="print-area">

        <!-- ===== 第一頁：統計 + 點傳師 ===== -->
        <div id="page1">
            <div class="grid grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border-t-8 border-blue-500">
                    <p class="text-base font-bold text-slate-500 mb-2 tracking-widest">應到人次 (名單總計)</p>
                    <p id="statTotalRequired" class="text-stats-num font-black">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-t-8 border-green-500">
                    <p class="text-base font-bold text-slate-500 mb-2 tracking-widest">應到實到 (名單出席)</p>
                    <p id="statPresentRequired" class="text-stats-num font-black text-green-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-t-8 border-purple-500">
                    <p class="text-base font-bold text-slate-500 mb-2 tracking-widest">全場總人數 (掃描總計)</p>
                    <p id="statTotalActual" class="text-stats-num font-black text-purple-600">0</p>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-rose-700 text-white px-6 py-4 text-2xl font-bold tracking-widest text-center">點傳師名單</div>
                <table class="w-full text-left border-collapse table-condensed" style="font-size:1.15rem">
                    <thead class="bg-slate-100 font-bold">
                        <tr><th class="border-b">壇名</th><th class="border-b">姓名</th><th class="border-b text-center">出席</th></tr>
                    </thead>
                    <tbody id="masterTable_點傳師"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== 第二頁：忠字班 ===== -->
        <div id="page2" class="mt-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-blue-800 text-white px-6 py-4 text-2xl font-bold tracking-widest text-center">忠字班名單</div>
                <table class="w-full text-left border-collapse table-condensed" style="font-size:1.15rem">
                    <thead class="bg-slate-100 font-bold">
                        <tr><th class="border-b">壇名</th><th class="border-b">姓名</th><th class="border-b text-center">出席</th></tr>
                    </thead>
                    <tbody id="masterTable_忠字班"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== 第三頁：義字班群 ===== -->
        <div id="page3" class="mt-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <!-- 需求1：標題字體更大 -->
                <div class="bg-slate-800 text-white px-6 py-4 text-3xl font-bold text-center tracking-widest">
                    公壇負責人 / 道務義字班 / 班務義字班
                </div>
                <div class="overflow-x-auto">
                    <!-- 需求1：打勾縮小 → formatCellYi 用 0.75rem，字體放大到1.35rem -->
                    <table class="yi-table border-collapse" style="font-size:1.35rem">
                        <thead class="bg-slate-100 font-bold text-slate-700">
                            <tr>
                                <th class="border p-2 text-center bg-orange-100" style="width:6%">壇名</th>
                                <th class="border p-2" style="width:13.5%">公壇負責人</th>
                                <th class="border p-2" style="width:13.5%">道務義字班</th>
                                <th class="border p-2 border-r-4 border-r-slate-400" style="width:13.5%">班務義字班</th>
                                <th class="border p-2 text-center bg-orange-100" style="width:6%">壇名</th>
                                <th class="border p-2" style="width:13.5%">公壇負責人</th>
                                <th class="border p-2" style="width:13.5%">道務義字班</th>
                                <th class="border p-2" style="width:13.5%">班務義字班</th>
                            </tr>
                        </thead>
                        <tbody id="masterTable_義字班群"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ===== 第四頁：負責講師出席名單 ===== -->
        <div id="page4" class="mt-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-teal-700 text-white px-6 py-4 text-2xl font-bold text-center tracking-widest">負責講師出席名單</div>
                <div class="overflow-x-auto">
                    <table class="lect-table border-collapse" style="font-size:1.2rem">
                        <thead class="bg-slate-100 font-bold text-slate-700">
                            <tr>
                                <th class="border p-2 text-center bg-blue-50" style="width:7%">班別</th>
                                <th class="border p-2 text-center bg-green-50" style="width:7%">道場</th>
                                <th class="border p-2 bg-orange-50" style="width:10%">壇名</th>
                                <th class="border p-2" style="width:15.2%">講師1</th>
                                <th class="border p-2" style="width:15.2%">講師2</th>
                                <th class="border p-2" style="width:15.2%">講師3</th>
                                <th class="border p-2" style="width:15.2%">講師4</th>
                                <th class="border p-2" style="width:15.2%">講師5</th>
                            </tr>
                        </thead>
                        <tbody id="masterTable_負責講師"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ===== 第五頁：非預設名單 ===== -->
        <!-- 需求2：標題縮小、壇名和姓名等大 -->
        <div id="page5" class="mt-8">
            <div id="extraSection" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hidden">
                <div class="bg-orange-600 text-white px-4 py-2 text-base font-bold text-center">非預設名單之出席人員 (列入總人數)</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse" style="font-size:1.1rem">
                        <tbody id="extraTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
    const mastersList = [

    // 實作：排序後，一列兩欄，左欄=第0,2,4...項；右欄=第1,3,5...項
    const volunteerGroups = [
        { church: "正承", names: ["余宏彬", "魏士疄", "姚麗英"] },
        { church: "正禮", names: ["顏綉芸", "何月桃", "雲淑如"] },
        { church: "正欣", names: ["王雅惠", "陳慧賢", "劉于溱"] },

        { church: "正同", names: ["林沛諠", "何添福", "張凱誼"] },
        { church: "正通", names: ["吳珮均", "吳珮甄", "蔡淑婷"] },
        { church: "正霖", names: ["楊滄堯", "廖柚淇", "廖家凰"] },
        { church: "正照", names: ["陳映雪", "顏麗秀", "黃品鈞"] },
        { church: "正港", names: ["楊莉蓁", "王昱翔", "阮儀暄"] },
        { church: "正命", names: ["巫金芳", "陳怡君", "林麗鴛"] },
        { church: "正路", names: ["洪金益", "洪佳隆", "張玄林"] },
        { church: "正步", names: ["林春芳", "施連昌", "黃秀英"] },
        { church: "正沺", names: ["陳宝秀", "陳錦雲", "黃莉芬"] },
        { church: "正奉", names: ["李穎甄", "陳曉鈴", "康嘉育"] },
        { church: "正湶", names: ["李雲卿", "李順源", "陳金蓮"] },
        { church: "正積", names: ["林永寶", "陳嘉榮", "林成懋"] },
        { church: "正惟", names: ["蕭梨山", "卓宜樺", "趙麗秋"] },
        { church: "正菁", names: ["張芳萍", "謝宛玲", "陳佳琪"] },
        { church: "正厚", names: ["陳瑛兒", "許家銘", "李芷懿"] },
        { church: "正願", names: ["洪裕嘉", "張瓊惠", "施博生"] },
        { church: "正師", names: ["陳姿穎", "郭宥禾", "鍾昀青"] },
        { church: "正合", names: ["梁家鳴", "魏淑花", "李沛宸"] },
        { church: "正洪", names: ["洪貴香", "洪美淑", "陳鈺頷"] },
        { church: "正湖", names: ["林水湖", "林妡綸", "何佳倫"] },
        { church: "正宥", names: ["陳 燕", "陳姿伊", "陳文政"] },
        { church: "正漢", names: ["林漢文", "江麗珍", "張順婷"] },
        { church: "正嶺", names: ["許淑玲", "洪巧融", "林嘉莉"] },
        { church: "正盛", names: ["林砡鋒", "林士媛", "余家承"] },
        { church: "正六", names: ["張碧蘭", "鄭祥", "黃柏勳"] },
        { church: "正持", names: ["楊采玲", "柯鈺斐", "黃鈺純"] },
        { church: "正薰", names: ["鄭純蓉", "簡嘉成", "蔡語蓁"] },
        { church: "正洲", names: ["陳南州", "林銘珍", "洪淑惠"] },
        { church: "正悅", names: ["林絲綾", "陳泓志", "楊惠玲"] },
        { church: "正楷", names: ["覃玉美", "王翠月", "王盈棋"] }
    ];

    // 負責講師名單，加入分班
    const lecturerGroups = [
        { unit:"公班", area:"崇德", altar:"正承",    lecturers:["陳素月","王昱翔","何添福","李穎甄","蔡雯雅"] },
        { unit:"公班", area:"崇德", altar:"正嶺",    lecturers:["陳宝秀","林成懋"] },
        { unit:"公班", area:"崇德", altar:"正盛",    lecturers:["林砡鋒","李莉菁"] },
        { unit:"公班", area:"崇德", altar:"正楷陳氏", lecturers:["覃玉美","洪淑惠","林銘珍"] },
        { unit:"公班", area:"崇德", altar:"正願",    lecturers:["洪裕嘉","張瓊惠"] },
        { unit:"公班", area:"行德", altar:"正承",    lecturers:["劉汝香","廖柚淇","余宏彬","阮儀暄"] },
        { unit:"公班", area:"行德", altar:"正通",    lecturers:["吳珮甄","蔡淑婷"] },
        { unit:"公班", area:"行德", altar:"正惟趙氏", lecturers:["趙麗秋","卓淑芬","林文鴻"] },
        { unit:"公班", area:"培德", altar:"正承",    lecturers:["陳瑛兒","楊采玲","許家銘","黃品鈞"] },
        { unit:"公班", area:"培德", altar:"正薰",    lecturers:["鄭純蓉","陳宝秀","李芳蓁"] },
        { unit:"公班", area:"至善", altar:"正承",    lecturers:["林秉良","顏麗秀","林淑菁","李淑如"] },
        { unit:"公班", area:"至善", altar:"正步",    lecturers:["黃秀英","李沛宸","林春芳","施連昌"] },
        { unit:"公班", area:"至善", altar:"正菁劉氏", lecturers:["陳佳琪","謝宛玲","林絲綾"] },
        { unit:"公班", area:"至善", altar:"正湖",    lecturers:["鄭祥","洪雪忞","何佳倫"] },
        { unit:"公班", area:"至善", altar:"正盛",    lecturers:["余家承","田人文"] },
        { unit:"公班", area:"至善", altar:"正楷陳氏", lecturers:["陳素玲","陳漢苙","魏士疄"] },
        { unit:"公班", area:"新民", altar:"正承",    lecturers:["梁家鳴","林沛諠","陳曉玲","黃鈺純"] },
        { unit:"公班", area:"新民", altar:"正欣",    lecturers:["林冠廷","陳慧賢","黃莉芬","王雅惠"] },
        { unit:"公班", area:"新民", altar:"正通",    lecturers:["吳珮均","馮輝亮","胡毓哲"] },
        { unit:"公班", area:"新民", altar:"正合",    lecturers:["黃金壽","顏麗秀"] },
        { unit:"分班", area:"行德", altar:"正命",    lecturers:["林麗鴛","黃昌德"] },
        { unit:"分班", area:"培德", altar:"正嶺",    lecturers:["洪巧融","許淑玲","林嘉莉"] },
        { unit:"分班", area:"至善", altar:"正積陳氏", lecturers:["林成懋","陳嘉榮"] },
        { unit:"分班", area:"至善", altar:"正合",    lecturers:["李沛宸","梁金聰"] },
        { unit:"分班", area:"至善", altar:"正合張李氏",lecturers:["李淑如","梁家鳴","李沛宸"] }
    ];

    let attendanceData = [];

    function initData() {
        attendanceData = [];
        mastersList.forEach(p =>
            attendanceData.push({ church: p.church, role: "點傳師", name: p.name.trim(), present: false })
        );
        loyalList.forEach(p =>
            attendanceData.push({ church: p.church, role: "忠字班", name: p.name.trim(), present: false })
        );
        volunteerGroups.forEach(item => {
            ["公壇負責人","道務義字班","班務義字班"].forEach((role, idx) =>
                attendanceData.push({ church: item.church, role, name: item.names[idx].trim(), present: false })
            );
        });
        lecturerGroups.forEach(item =>
            item.lecturers.forEach(name =>
                attendanceData.push({ church: item.altar, role: "負責講師", name: name.trim(), present: false })
            )
        );
        renderAll();
    }

    function renderAll() {
        // 點傳師
        const masterTbody = document.getElementById('masterTable_點傳師');
        masterTbody.innerHTML = '';
        attendanceData.filter(p => p.role === "點傳師").forEach(p => {
            const tr = document.createElement('tr');
            tr.className = p.present ? 'checked-row font-bold' : 'zebra-row';
            tr.innerHTML = `<td>${p.church}</td><td class="font-bold">${p.name}</td>
                <td class="text-center">${p.present ? '<span class="checkmark">✔</span>' : '<span class="text-slate-200">─</span>'}</td>`;
            masterTbody.appendChild(tr);
        });

        // 忠字班
        const loyalTbody = document.getElementById('masterTable_忠字班');
        loyalTbody.innerHTML = '';
        attendanceData.filter(p => p.role === "忠字班").forEach(p => {
            const tr = document.createElement('tr');
            tr.className = p.present ? 'checked-row font-bold' : 'zebra-row';
            tr.innerHTML = `<td>${p.church}</td><td class="font-bold">${p.name}</td>
                <td class="text-center">${p.present ? '<span class="checkmark">✔</span>' : '<span class="text-slate-200">─</span>'}</td>`;
            loyalTbody.appendChild(tr);
        });

        // 義字班群
        // 需求3：左邊先排序再右邊，兩邊對稱
        // 將 volunteerGroups 重新排列：奇數位置(0,2,4...)在左欄，偶數位置(1,3,5...)在右欄
        const groupTbody = document.getElementById('masterTable_義字班群');
        groupTbody.innerHTML = '';
        const total = volunteerGroups.length;
        const half = Math.ceil(total / 2);
        // 左欄 = 索引 0~half-1，右欄 = 索引 half~total-1
        for (let i = 0; i < half; i++) {
            const tr = document.createElement('tr');
            tr.className = i % 2 === 0 ? 'bg-white' : 'bg-slate-50';
            let rowHtml = '';
            for (let col = 0; col < 2; col++) {
                const idx = col === 0 ? i : i + half;
                const item = volunteerGroups[idx];
                const sepClass = col === 0 ? 'border-r-4 border-r-slate-400' : '';
                if (!item) {
                    rowHtml += `<td class="border p-2 church-col bg-orange-50"></td>
                                <td class="border p-2"></td><td class="border p-2"></td>
                                <td class="border p-2 ${sepClass}"></td>`;
                    continue;
                }
                const people = attendanceData.filter(p =>
                    p.church === item.church && ["公壇負責人","道務義字班","班務義字班"].includes(p.role)
                );
                const l = people.find(p => p.role === "公壇負責人");
                const d = people.find(p => p.role === "道務義字班");
                const b = people.find(p => p.role === "班務義字班");
                rowHtml += `
                    <td class="border p-2 church-col font-bold text-center bg-orange-50">${item.church}</td>
                    <td class="border p-2 ${l?.present ? 'checked-row' : ''}">${formatCellYi(l)}</td>
                    <td class="border p-2 ${d?.present ? 'checked-row' : ''}">${formatCellYi(d)}</td>
                    <td class="border p-2 ${sepClass} ${b?.present ? 'checked-row' : ''}">${formatCellYi(b)}</td>
                `;
            }
            tr.innerHTML = rowHtml;
            groupTbody.appendChild(tr);
        }

        // 負責講師
        renderLecturers();

        updateStats();
    }

    function formatCellYi(p) {
        if (!p) return '';
        // 需求1：打勾縮小到0.75rem，名字維持大字
        return `<div class="flex justify-between items-center gap-1">
                    <span class="${p.present ? 'font-bold' : ''}">${p.name}</span>
                    ${p.present ? '<span class="checkmark" style="font-size:0.75rem;flex-shrink:0">✔</span>' : ''}
                </div>`;
    }

    function renderLecturers() {
        const tbody = document.getElementById('masterTable_負責講師');
        tbody.innerHTML = '';
        let prevArea = '';
        lecturerGroups.forEach(item => {
            const tr = document.createElement('tr');
            tr.className = 'zebra-row';
            const lects = item.lecturers.map(name => {
                const found = attendanceData.find(p => p.role === "負責講師" && p.name === name && p.church === item.altar);
                return found || { name, present: false };
            });

            const areaChanged = item.area !== prevArea;
            if (areaChanged) prevArea = item.area;

            // 分班字色藍色
            const unitClass = item.unit === "分班" ? 'unit-fenban' : '';

            let cells = `
                <td class="border p-2 lect-unit text-center ${unitClass}" style="font-size:1.1rem">${item.unit}</td>
                <td class="border p-2 text-center font-bold" style="background-color:${areaColor(item.area)};font-size:1.1rem">${item.area}</td>
                <td class="border p-2 lect-altar" style="font-size:1.1rem">${item.altar}</td>
            `;
            for (let i = 0; i < 5; i++) {
                const p = lects[i];
                if (p) {
                    cells += `<td class="border p-2 ${p.present ? 'checked-row' : ''}">
                        <div class="flex justify-between items-center gap-1">
                            <span class="${p.present ? 'font-bold' : ''}">${p.name}</span>
                            ${p.present ? '<span class="checkmark" style="font-size:0.85rem;flex-shrink:0">✔</span>' : ''}
                        </div></td>`;
                } else {
                    cells += `<td class="border p-2"></td>`;
                }
            }
            tr.innerHTML = cells;
            tbody.appendChild(tr);
        });
    }

    function areaColor(area) {
        const map = { '崇德':'#dbeafe', '行德':'#dcfce7', '培德':'#fef9c3', '至善':'#fce7f3', '新民':'#ede9fe' };
        return map[area] || '#f1f5f9';
    }

    function processAttendance() {
        const rawText = document.getElementById('barcodeInput').value.trim();
        if (!rawText) return;
        const lines = rawText.split('\n');
        const header = lines[0].split('\t');
        const nameIdx = header.indexOf('姓名');
        const churchIdx = header.indexOf('佛堂');
        if (nameIdx === -1) return alert("錯誤：資料中找不到「姓名」標題列！");

        attendanceData.forEach(p => p.present = false);
        const actualTotalSet = new Set();
        const extra = [];

        for (let i = 1; i < lines.length; i++) {
            const row = lines[i].split('\t');
            if (row.length <= nameIdx) continue;
            const name = row[nameIdx].trim();
            const church = churchIdx !== -1 ? row[churchIdx].trim() : "未知";
            if (!name) continue;
            actualTotalSet.add(name);

            let matched = false;
            attendanceData.forEach(p => {
                if (p.name === name) { p.present = true; matched = true; }
            });
            if (!matched) extra.push({ name, church });
        }

        renderAll();
        renderExtra(extra);
        updateStats(actualTotalSet.size);

        const btn = document.getElementById('processBtn');
        btn.innerText = "核對成功！";
        btn.classList.replace('bg-blue-600', 'bg-green-600');
        setTimeout(() => { btn.innerText = "執行核對"; btn.classList.replace('bg-green-600', 'bg-blue-600'); }, 2000);
    }

    function renderExtra(extraList) {
        const sec = document.getElementById('extraSection');
        const tbody = document.getElementById('extraTableBody');
        if (extraList.length === 0) return sec.classList.add('hidden');
        sec.classList.remove('hidden');
        tbody.innerHTML = '';
        const uniqueExtra = [];
        const seen = new Set();
        extraList.forEach(e => { if (!seen.has(e.name)) { uniqueExtra.push(e); seen.add(e.name); } });
        // 需求2：壇名和姓名等大 (font-size:1.1rem)，移除 text-slate-400 小字差異
        for (let i = 0; i < uniqueExtra.length; i += 4) {
            const tr = document.createElement('tr');
            tr.className = 'zebra-row';
            let rowHtml = '';
            for (let j = 0; j < 4; j++) {
                const p = uniqueExtra[i + j];
                rowHtml += p
                    ? `<td class="border px-4 py-2" style="font-size:1.1rem"><span class="font-bold mr-2">${p.church}</span><span class="font-bold">${p.name}</span><span class="checkmark ml-2">✔</span></td>`
                    : `<td class="border"></td>`;
            }
            tr.innerHTML = rowHtml;
            tbody.appendChild(tr);
        }
    }

    function updateStats(actualTotal = 0) {
        document.getElementById('statTotalRequired').innerText = attendanceData.length;
        document.getElementById('statPresentRequired').innerText = attendanceData.filter(p => p.present).length;
        if (actualTotal > 0) document.getElementById('statTotalActual').innerText = actualTotal;
    }

    function resetData() {
        if (confirm("確定要重置所有簽到狀態嗎？")) {
            document.getElementById('barcodeInput').value = '';
            initData();
            document.getElementById('extraSection').classList.add('hidden');
            document.getElementById('statTotalActual').innerText = "0";
        }
    }

    window.onload = initData;
</script>
</body>
</html>
