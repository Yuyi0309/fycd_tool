<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>2026 會議簽到統計系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* ══════════════════════════════════════════════════════════════
   全域
   ══════════════════════════════════════════════════════════════ */
body { font-size:2.2rem; background:#f1f5f9; }
.stat-num { font-size:3.5rem; font-weight:1800; line-height:1; }
.barcode-input-box {height: 5rem;}/* ← 【改輸入框的大小】*/
/* ══════════════════════════════════════════════════════════════
   【螢幕版 共用 grid-row 元件】
   .g-row     = 一列（display:flex）
   .g-cell    = 一格（預設文字大小、padding、置中對齊）
   .g-head    = 標題列底色
   .g-odd/even = 斑馬底色
   .g-hit     = 已出席（綠底，!important 蓋過斑馬）
   ══════════════════════════════════════════════════════════════ */
.g-row   { display:flex; border-bottom:1px solid #d1d5db; }
.g-row:last-child { border-bottom:none; }
.g-cell  { padding:6px 5px; overflow:hidden; white-space:nowrap;
           display:flex; align-items:center; justify-content:center;
           border-right:1px solid #d1d5db; box-sizing:border-box; }
.g-cell:last-child { border-right:none; }
.g-head  { background:#f1f5f9; font-weight:700; color:#374151; }
.g-odd   { background:#ffffff; }
.g-even  { background:#f8fafc; }
.g-hit   { background:#dcfce7 !important; }
.stat-row-gap {    margin-bottom: 1rem;}   /* 螢幕版間距,原本 mb-4 = 1rem，可自行調整 */


/* ══════════════════════════════════════════════════════════════
   【螢幕版 PAGE 1：點傳師 + 忠字班】
   ── 調整說明 ──
   .p1-wrap / .p1-half：左右並排容器，不用動
   .p1-church  欄寬 → 改 width
   .p1-name    欄寬 → 改 width
   .p1-att     欄寬 → 改 width
   .p1-cell    文字大小 → 改 font-size
               格子間距 → 改 padding
   ══════════════════════════════════════════════════════════════ */
.p1-wrap  { display:flex; gap:12px; }
.p1-half  { flex:1 1 0; min-width:0; }
.p1-grid  { border:1px solid #d1d5db; border-radius:0 0 8px 8px; overflow:hidden; }

/* 螢幕版 P1 欄寬 */
.p1-church { width:90px;  flex:0 0 90px;  }  /* ← 【螢幕 P1 壇名欄寬】px */
.p1-name   { flex:1 1 0;   min-width:0;     }  /* ← 【螢幕 P1 姓名欄寬】flex 自動填滿 */
.p1-att    { width:90px;   flex:0 0 90px;   }  /* ← 【螢幕 P1 出席欄寬】px */


/* 螢幕版 P1 文字大小與格子間距 */
.p1-cell {
    font-size:1.5rem;   /* ← 【螢幕 P1 文字大小】 */
    padding:8px 5px;    /* ← 【螢幕 P1 格子間距】上下 / 左右 */
}

/* ══════════════════════════════════════════════════════════════
   【螢幕版 PAGE 2：義字班】
   左右各 4 欄（壇名＋三角色），中間一條粗分隔線
   ── 調整說明 ──
   .yi-church  壇名欄寬 → 改 width / flex
   .yi-role    角色欄寬 → 改 flex（三個角色欄平均分配剩餘空間）
   .yi-sep     中間分隔線粗細/顏色 → 改 border-right
   .yi-cell    文字大小 → 改 font-size
               格子間距 → 改 padding
   .yi-ok      ○ 與名字間距 → 改 margin-left
               ○ 大小       → 改 font-size
   ══════════════════════════════════════════════════════════════ */
.yi-grid   { border:1px solid #d1d5db; overflow:hidden; }
.yi-church { width:72px; flex:0 0 72px; background:#fff7ed; font-weight:700; justify-content:center; } /* ← 【螢幕 P2 壇名欄寬】 */
.yi-role   { flex:1 1 0; min-width:0; }  /* ← 【螢幕 P2 角色欄寬】三欄均分剩餘空間 */
.yi-sep    { border-right:3px solid #94a3b8 !important; } /* ← 左半最後一欄右側粗線 */

/* 螢幕版 P2 文字大小與格子間距 */
.yi-cell {
    font-size:1.3rem;  /* ← 【螢幕 P2 文字大小】 */
    padding:9px 4px;    /* ← 【螢幕 P2 格子間距】上下 / 左右 */
}
/* 螢幕版 P2 ○ 符號 */
.yi-ok {
    color:#16a34a; font-weight:700;
    margin-left:3px;    /* ← 【螢幕 P2 名字與○間距】 */
    font-size:1.1em;    /* ← 【螢幕 P2 ○ 大小】em=相對同格文字 */
}

/* ══════════════════════════════════════════════════════════════
   【螢幕版 PAGE 3：負責講師】
   ── 調整說明 ──
   .lc-unit    公/分欄寬 → 改 width / flex
   .lc-area    班別欄寬 → 改 width / flex
   .lc-altar   地點欄寬 → 改 width / flex
   .lc-names   講師名單欄 → flex:1 1 0 自動填滿，不用動
   .lc-cell    文字大小 → 改 font-size
               格子間距 → 改 padding
   .lect-chip  講師名字大小  → 改 font-size
               講師名字間距  → 改 margin-right
   .lect-ok    ○ 與名字間距 → 改 margin-left
               ○ 大小       → 改 font-size
   ══════════════════════════════════════════════════════════════ */
.lc-grid  { border:1px solid #d1d5db; overflow:hidden; }
.lc-unit  { width:80px;  flex:0 0 80px;  justify-content:center; }  /* ← 【螢幕 P3 公/分欄寬】 */
.lc-area  { width:80px;  flex:0 0 80px;  justify-content:center; }  /* ← 【螢幕 P3 班別欄寬】 */
.lc-altar { width:110px; flex:0 0 110px; justify-content:center; }  /* ← 【螢幕 P3 地點欄寬】 */
.lc-names { flex:1 1 0; min-width:0; flex-wrap:wrap; white-space:normal; align-items:center; justify-content:flex-start; } /* 自動填滿 */

/* 螢幕版 P3 文字大小與格子間距 */
.lc-cell {
    font-size:1.12rem;  /* ← 【螢幕 P3 格子文字大小】（公/分、班別、地點） */
    padding:7px 5px;    /* ← 【螢幕 P3 格子間距】上下 / 左右 */
}
/* 螢幕版 P3 講師名字 chip */
.lect-chip {
    display:inline-block;
    font-size:1.5rem;   /* ← 【螢幕 P3 講師姓名大小】 */
    margin-right:2em;   /* ← 【螢幕 P3 講師姓名間距】 */
    white-space:nowrap;
}
/* 螢幕版 P3 ○ 符號 */
.lect-ok {
    color:#16a34a; font-weight:700;
    margin-left:2px;    /* ← 【螢幕 P3 名字與○間距】 */
    font-size:0.85em;   /* ← 【螢幕 P3 ○ 大小】 */
}

/* ══════════════════════════════════════════════════════════════
   【列印樣式 @media print】
   ★ 原則：所有列印數值一律用「px」，與螢幕版完全無關。
     螢幕版改什麼都不會影響列印；列印版改什麼都不影響螢幕。
   ══════════════════════════════════════════════════════════════ */
@media print {
	/* 統計三格列印樣式 */
	.grid-cols-3 {
    gap:24px;       /* 格子間距 */
	 padding-top:50px;
	margin-bottom:54px;
	
	}
	.grid-cols-3 > div {
    padding:18px;
    border:1px solid #cbd5e1;   /* 整個格子加外框 */
    border-top-width:24px;        /* 保留上方色條較粗的效果 */
    border-radius:8px;
    background:#fff;
	}
	.grid-cols-3 .stat-num {
    font-size:56px;  /* ← 數字大小,改這裡 */
	}
	.grid-cols-3 p.text-xs {
    font-size:18px;  /* ← 標題文字大小 */
	}
    .no-print { display:none !important; }
    body { background:white; padding:0; margin:0; }
    .print-wrap { max-width:100%; width:100%; padding:0; margin:0; }
    * { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .shadow-sm, .shadow-xl, .rounded-xl { box-shadow:none !important; }
    #page1 { page-break-before:avoid; page-break-after:always; }
    #page2 { page-break-before:always; page-break-after:always; }
    #page3 { page-break-before:always; page-break-after:always; }
    #page4 { page-break-before:always; page-break-after:auto;   }

    /* ── 列印版 共用 row/cell 基底 ──
       螢幕版的 rem 全部在此被 px 蓋掉               */
    .g-cell { padding:0; font-size:0; } /* 先清零，各頁再個別設定 */

    /* ──────────────────────────────────────────────
       【列印版 PAGE 1：點傳師 + 忠字班】
       【列印 P1 文字大小】→ 改 .p1-cell font-size（px）
       【列印 P1 格子間距】→ 改 .p1-cell padding（上下px 左右px）
       【列印 P1 壇名欄寬】→ 改 .p1-church width + flex-basis（px）
       【列印 P1 出席欄寬】→ 改 .p1-att   width + flex-basis（px）
       【列印 P1 姓名欄寬】→ .p1-name flex:1 1 0 自動填滿，不用動
    ────────────────────────────────────────────── */
    .p1-wrap  { display:flex; gap:6px; }
    .p1-half  { flex:1 1 0; min-width:0; }
    .p1-cell {
        font-size:20px;   /* ← 【列印 P1 文字大小】 */
        padding:12px 3px; /* ← 【列印 P1 格子間距】上下 / 左右 */
    }
    .p1-church { width:90px;  flex:0 0 90px;  } /* ← 【列印 P1 壇名欄寬】 */
    .p1-att    { width:42px;  flex:0 0 60px;  } /* ← 【列印 P1 出席欄寬】 */

    /* ──────────────────────────────────────────────
       【列印版 PAGE 2：義字班】
       【列印 P2 文字大小】→ 改 .yi-cell font-size（px）
       【列印 P2 格子間距】→ 改 .yi-cell padding（上下px 左右px）
       【列印 P2 壇名欄寬】→ 改 .yi-church width + flex-basis（px）
       【列印 P2 名字與○間距】→ 改 .yi-ok margin-left（px）
       【列印 P2 ○ 大小】   → 改 .yi-ok font-size（px）
    ────────────────────────────────────────────── */
    .yi-cell {
        font-size:18px;  /* ← 【列印 P2 文字大小】 */
        padding:9px 3px; /* ← 【列印 P2 格子間距】上下 / 左右 */
    }
    .yi-church { width:56px; flex:0 0 56px; } /* ← 【列印 P2 壇名欄寬】 */
    .yi-ok {
        margin-left:2px; /* ← 【列印 P2 名字與○間距】 */
        font-size:16px;  /* ← 【列印 P2 ○ 大小】 */
    }

    /* ──────────────────────────────────────────────
       【列印版 PAGE 3：負責講師】
       【列印 P3 格子文字大小】→ 改 .lc-cell font-size（px）
       【列印 P3 格子間距】   → 改 .lc-cell padding（上下px 左右px）
       【列印 P3 公/分欄寬】  → 改 .lc-unit width + flex-basis（px）
       【列印 P3 班別欄寬】   → 改 .lc-area width + flex-basis（px）
       【列印 P3 地點欄寬】   → 改 .lc-altar width + flex-basis（px）
       【列印 P3 講師姓名大小】→ 改 .lect-chip font-size（px）
       【列印 P3 講師姓名間距】→ 改 .lect-chip margin-right（px）
       【列印 P3 名字與○間距】→ 改 .lect-ok margin-left（px）
       【列印 P3 ○ 大小】     → 改 .lect-ok font-size（px）
    ────────────────────────────────────────────── */
    .lc-cell {
        font-size:18px;  /* ← 【列印 P3 格子文字大小】 */
        padding:4px 3px; /* ← 【列印 P3 格子間距】上下 / 左右 */
    }
    .lc-unit  { width:60px;  flex:0 0 60px;  } /* ← 【列印 P3 公/分欄寬】 */
    .lc-area  { width:60px;  flex:0 0 60px;  } /* ← 【列印 P3 班別欄寬】 */
    .lc-altar { width:100px; flex:0 0 100px; } /* ← 【列印 P3 地點欄寬】 */
    .lect-chip {
        font-size:19px;    /* ← 【列印 P3 講師姓名大小】 */
        margin-right:16px; /* ← 【列印 P3 講師姓名間距】 */
    }
    .lect-ok {
        margin-left:2px;  /* ← 【列印 P3 名字與○間距】 */
        font-size:17px;   /* ← 【列印 P3 ○ 大小】 */
    }
    /* PAGE 4 extra 格子 */
    .ex-cell {
        font-size:18px;
        padding:6px 8px;
    }
}
</style>
</head>
<body class="min-h-screen p-2 md:p-5">
<div class="max-w-[1500px] mx-auto print-wrap">

<!-- ── 操作區 ── -->
<header class="no-print mb-5 bg-white p-5 rounded-xl shadow-xl border border-slate-200">
    <h1 class="text-2xl font-bold mb-3 flex items-center gap-2">
        <span class="bg-blue-600 text-white px-2 py-1 rounded text-lg">2026</span> 會議簽到統計系統
    </h1>
    <textarea id="barcodeInput" class="w-full barcode-input-box p-3 text-sm font-mono border border-slate-300 rounded-lg mb-3"
        placeholder="請在此貼上包含「姓名、佛堂」標題的 Excel 內容..."></textarea>
    <div class="flex flex-wrap gap-3">
        <button id="processBtn" onclick="processAttendance()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-lg font-bold text-lg shadow">執行核對</button>
        <button onclick="window.print()"
            class="bg-slate-700 hover:bg-slate-800 text-white px-6 py-2 rounded-lg text-lg shadow">列印報表</button>
        <button onclick="resetData()"
            class="bg-white border border-slate-300 text-slate-600 px-6 py-2 rounded-lg text-lg hover:bg-slate-50">清空數據</button>
    </div>
</header>

<!-- ══════════ PAGE 1：點傳師 + 忠字班 ══════════ -->
<div id="page1">
    <!-- 統計三格 -->
    <div class="grid grid-cols-3 gap-3 stat-row-gap">
        <div class="bg-white p-4 rounded-xl border-t-8 border-blue-500 shadow-sm">
            <p class="text-xs font-bold text-slate-500 mb-1">應到人次（名單總計）</p>
            <p id="statTotal" class="stat-num">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl border-t-8 border-green-500 shadow-sm">
            <p class="text-xs font-bold text-slate-500 mb-1">應到實到（名單出席）</p>
            <p id="statPresent" class="stat-num text-green-600">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl border-t-8 border-purple-500 shadow-sm">
            <p class="text-xs font-bold text-slate-500 mb-1">全場總人數（掃描總計）</p>
            <p id="statActual" class="stat-num text-purple-600">0</p>
        </div>
    </div>

    <!-- 點傳師 + 忠字班 並排 -->
    <div class="p1-wrap">
        <!-- 左：點傳師 -->
        <div class="p1-half bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-rose-700 text-white py-2 text-xl font-bold text-center tracking-wider">點傳師名單</div>
            <div class="p1-grid">
                <!-- 標題列 -->
                <div class="g-row g-head">
                    <div class="g-cell p1-cell p1-church">壇名</div>
                    <div class="g-cell p1-cell p1-name">姓名</div>
                    <div class="g-cell p1-cell p1-att">出席</div>
                </div>
                <!-- 資料列由 renderP1() 動態插入 -->
                <div id="tb_master"></div>
            </div>
        </div>
        <!-- 右：忠字班 -->
        <div class="p1-half bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-blue-800 text-white py-2 text-xl font-bold text-center tracking-wider">忠字班名單</div>
            <div class="p1-grid">
                <div class="g-row g-head">
                    <div class="g-cell p1-cell p1-church">壇名</div>
                    <div class="g-cell p1-cell p1-name">姓名</div>
                    <div class="g-cell p1-cell p1-att">出席</div>
                </div>
                <div id="tb_loyal"></div>
            </div>
        </div>
    </div>
</div>

<!-- ══════════ PAGE 2：義字班群 ══════════ -->
<div id="page2" class="mt-6">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-slate-800 text-white px-4 py-3 text-2xl font-bold text-center tracking-widest">
            公壇負責人 / 道務義字班 / 班務義字班
        </div>
        <div class="yi-grid">
            <!-- 義字班標題列（左半：壇名+三角色；右半：壇名+三角色） -->
            <div class="g-row g-head">
                <div class="g-cell yi-cell yi-church">壇名</div>
                <div class="g-cell yi-cell yi-role">公壇負責人</div>
                <div class="g-cell yi-cell yi-role">道務義字班</div>
                <div class="g-cell yi-cell yi-role yi-sep">班務義字班</div>
                <div class="g-cell yi-cell yi-church">壇名</div>
                <div class="g-cell yi-cell yi-role">公壇負責人</div>
                <div class="g-cell yi-cell yi-role">道務義字班</div>
                <div class="g-cell yi-cell yi-role">班務義字班</div>
            </div>
            <!-- 資料列由 renderP2() 動態插入 -->
            <div id="tb_yi"></div>
        </div>
    </div>
</div>

<!-- ══════════ PAGE 3：負責講師 ══════════ -->
<div id="page3" class="mt-6">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-teal-700 text-white px-4 py-3 text-xl font-bold text-center tracking-widest">負責講師出席名單</div>
        <div class="lc-grid">
            <!-- 標題列 -->
            <div class="g-row g-head">
                <div class="g-cell lc-cell lc-unit"  style="background:#eff6ff">公/分</div>
                <div class="g-cell lc-cell lc-area"  style="background:#f0fdf4">班別</div>
                <div class="g-cell lc-cell lc-altar" style="background:#fff7ed">地點</div>
                <div class="g-cell lc-cell lc-names" style="background:#f8fafc">講師名單</div>
            </div>
            <!-- 資料列由 renderP3() 動態插入 -->
            <div id="tb_lect"></div>
        </div>
    </div>
</div>

<!-- ══════════ PAGE 4：非預設名單 ══════════ -->
<div id="page4" class="mt-6">
    <div id="extraSection" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-orange-600 text-white px-4 py-1 text-sm font-bold text-center">非預設名單之出席人員（列入總人數）</div>
        <!-- 資料列由 renderExtra() 動態插入 -->
        <div id="tb_extra"></div>
    </div>
</div>

</div><!-- /print-wrap -->
<script>
/* ════════════════════════════════════════════════════════════
   資料區
   ════════════════════════════════════════════════════════════ */
const mastersList = [
    {church:"正洪",name:"洪貴香"},{church:"正命",name:"巫金芳"},{church:"正吉",name:"李勝忠"},
    {church:"正欣",name:"葉德明"},{church:"正菁",name:"張素華"},{church:"正通",name:"林清泉"},
    {church:"正霖",name:"沈美華"},{church:"正惟",name:"王秀娟"},{church:"正盛",name:"林艾慧"}
];
const loyalList = [
    {church:"正承",name:"劉汝香"},{church:"正欣",name:"陳素月"},{church:"正同",name:"林沛諠"},
    {church:"正合",name:"梁家鳴"},{church:"正路",name:"洪佳堯"},{church:"正霖",name:"蔡文邦"},
    {church:"正悅",name:"林絲綾"},{church:"正承",name:"余宏彬"},{church:"正持",name:"林秉良"}
];

const AREA_BG = {崇德:'#dbeafe',行德:'#dcfce7',培德:'#fef9c3',至善:'#fce7f3',新民:'#ede9fe'};

let DB = [];

function init() {
    DB = [];
    mastersList.forEach(p => DB.push({church:p.church, role:'點傳師',   name:p.name.trim(), present:false}));
    loyalList.forEach(p   => DB.push({church:p.church, role:'忠字班',   name:p.name.trim(), present:false}));
    volunteerGroups.forEach(g => {
        ['公壇負責人','道務義字班','班務義字班'].forEach((role,i) =>
            DB.push({church:g.church, role, name:g.names[i].trim(), present:false}));
    });
    lecturerGroupsRaw.forEach(g => g.lecturers.forEach(name =>
        DB.push({church:g.altar, role:'負責講師', name:name.trim(), present:false})));
    renderAll();
}

function renderAll() { renderP1(); renderP2(); renderP3(); updateStats(); }

/* ── PAGE 1 ──
   每列：壇名 | 姓名 | 出席○
   class 組合：g-row + 斑馬/hit；每格：g-cell + p1-cell + 欄寬 class       */
function renderP1() {
    ['點傳師','忠字班'].forEach((role, ri) => {
        const wrap = document.getElementById(['tb_master','tb_loyal'][ri]);
        wrap.innerHTML = '';
        DB.filter(p => p.role === role).forEach((p, i) => {
            const row = document.createElement('div');
            row.className = 'g-row ' + (p.present ? 'g-hit' : (i%2===0 ? 'g-odd' : 'g-even'));
            row.innerHTML =
                `<div class="g-cell p1-cell p1-church">${p.church}</div>` +
                `<div class="g-cell p1-cell p1-name" style="font-weight:700">${p.name}</div>` +
                `<div class="g-cell p1-cell p1-att" style="color:#16a34a;font-weight:700">${p.present?'○':''}</div>`;
            wrap.appendChild(row);
        });
    });
}

/* ── PAGE 2 ──
   每列：[左]壇名＋3角色 | [分隔] | [右]壇名＋3角色
   yi-sep 加在左半第三個角色格（班務義字班）右側                           */
function renderP2() {
    const wrap = document.getElementById('tb_yi');
    wrap.innerHTML = '';
    const half = Math.ceil(volunteerGroups.length / 2);
    for (let i = 0; i < half; i++) {
        const row = document.createElement('div');
        row.className = 'g-row ' + (i%2===0 ? 'g-odd' : 'g-even');
        let html = '';
        for (let col = 0; col < 2; col++) {
            const item = volunteerGroups[col===0 ? i : i+half];
            const isSepSide = col===0; /* 左半的班務義字班格加粗右線 */
            if (!item) {
                html += `<div class="g-cell yi-cell yi-church${isSepSide?' yi-sep':''}"></div>
                         <div class="g-cell yi-cell yi-role"></div>
                         <div class="g-cell yi-cell yi-role"></div>
                         <div class="g-cell yi-cell yi-role${isSepSide?' yi-sep':''}"></div>`;
                /* 修正：空格的 sep 只加在壇名那格，班務那格才是分隔線 */
                continue;
            }
            const roles = ['公壇負責人','道務義字班','班務義字班'];
            const people = roles.map(r => DB.find(p => p.church===item.church && p.role===r));
            html += `<div class="g-cell yi-cell yi-church" style="background:#fff7ed">${item.church}</div>`;
            people.forEach((p, pi) => {
                const isSep  = isSepSide && pi===2; /* 左半班務義字班右側加粗線 */
                const hitCls = p?.present ? ' g-hit' : '';
                const nameHtml = p ? (p.present
                    ? `<b>${p.name}</b><span class="yi-ok">○</span>`
                    : p.name) : '';
                html += `<div class="g-cell yi-cell yi-role${isSep?' yi-sep':''}${hitCls}">${nameHtml}</div>`;
            });
        }
        row.innerHTML = html;
        wrap.appendChild(row);
    }
}

/* ── PAGE 3 ──
   每列：公/分 | 班別 | 地點 | 講師 chip 群
   講師 chip 用 inline-block，允許折行                                       */
function renderP3() {
    const wrap = document.getElementById('tb_lect');
    wrap.innerHTML = '';
    lecturerGroupsRaw.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'g-row ' + (i%2===0 ? 'g-odd' : 'g-even');
        const isFen     = item.unit==='分班';
        const unitBg    = isFen ? '#dbeafe' : '#eff6ff';
        const unitColor = isFen ? '#1d4ed8' : '#1e3a5f';
        const areaBg    = AREA_BG[item.area] || '#f1f5f9';
        const chipsHtml = item.lecturers.map(name => {
            const p = DB.find(d => d.role==='負責講師' && d.name===name && d.church===item.altar) || {name, present:false};
            return `<span class="lect-chip${p.present?' font-bold':''}">${p.name}${p.present?`<span class="lect-ok">○</span>`:''}</span>`;
        }).join('');
        row.innerHTML =
            `<div class="g-cell lc-cell lc-unit"  style="background:${unitBg};color:${unitColor};font-weight:700">${item.unit}</div>` +
            `<div class="g-cell lc-cell lc-area"  style="background:${areaBg};font-weight:700">${item.area}</div>` +
            `<div class="g-cell lc-cell lc-altar" style="background:#fff7ed;font-weight:700">${item.altar}</div>` +
            `<div class="g-cell lc-cell lc-names">${chipsHtml}</div>`;
        wrap.appendChild(row);
    });
}

function updateStats(actual=0) {
    document.getElementById('statTotal').innerText   = DB.length;
    document.getElementById('statPresent').innerText = DB.filter(p=>p.present).length;
    if (actual>0) document.getElementById('statActual').innerText = actual;
}

/* ── PAGE 4 ──
   每列 4 人的 flex row                                                      */
function renderExtra(list) {
    const sec   = document.getElementById('extraSection');
    const wrap  = document.getElementById('tb_extra');
    const unique = [...new Map(list.map(e=>[e.name,e])).values()];
    if (!unique.length) return sec.classList.add('hidden');
    sec.classList.remove('hidden');
    wrap.innerHTML = '';
    for (let i=0; i<unique.length; i+=4) {
        const row = document.createElement('div');
        row.className = 'g-row ' + (i%8===0 ? 'g-odd' : 'g-even');
        let h = '';
        for (let j=0; j<4; j++) {
            const p = unique[i+j];
            /* 【P4 文字大小】→ 改 font-size；【P4 格子間距】→ 改 padding */
            h += p
                ? `<div class="g-cell ex-cell" style="flex:1;font-size:1.1rem;padding:5px 8px">
                       <b>${p.church}</b>&nbsp;${p.name}&nbsp;<span style="color:#16a34a;font-weight:700">○</span>
                   </div>`
                : `<div class="g-cell ex-cell" style="flex:1"></div>`;
        }
        row.innerHTML = h;
        wrap.appendChild(row);
    }
}

function processAttendance() {
    const raw = document.getElementById('barcodeInput').value.trim();
    if (!raw) return;
    const lines = raw.split('\n');
    const hdr = lines[0].split('\t');
    const ni  = hdr.indexOf('姓名');
    const ci  = hdr.indexOf('佛堂');
    if (ni===-1) return alert('找不到「姓名」欄！');
    DB.forEach(p => p.present=false);
    const seen=new Set(), extra=[];
    for (let i=1; i<lines.length; i++) {
        const row    = lines[i].split('\t');
        const name   = (row[ni]||'').trim();
        const church = ci!==-1 ? (row[ci]||'').trim() : '未知';
        if (!name) continue;
        seen.add(name);
        let hit = false;
        DB.forEach(p => { if(p.name===name){p.present=true; hit=true;} });
        if (!hit) extra.push({name, church});
    }
    renderAll();
    renderExtra(extra);
    updateStats(seen.size);
    const btn = document.getElementById('processBtn');
    btn.innerText='核對成功！'; btn.classList.replace('bg-blue-600','bg-green-600');
    setTimeout(()=>{ btn.innerText='執行核對'; btn.classList.replace('bg-green-600','bg-blue-600'); },2000);
}

function resetData() {
    if (!confirm('確定清空所有簽到？')) return;
    document.getElementById('barcodeInput').value='';
    document.getElementById('extraSection').classList.add('hidden');
    document.getElementById('statActual').innerText='0';
    init();
}

window.onload=init;
